name: branch-janitor

# Fleet-wide branch hygiene for the public portal (Dan-direct 070526 "FIX THIS FUCKING
# BRANCH SHIT ... NEVER EVER AGAIN ... NOT SPECTRAPPED TO ANY SINGLE CREW"). The portal
# is public CODE (legit images, review-worthy feature branches), so this janitor is
# DELETE-ONLY: it never reconciles branch-only code to main (that is a review-worthy
# change, not auto-mergeable) and never blocks media. It deletes ONLY branches whose
# content is 100% on main already (nothing lost) + stale (>4 days) + non-persistent.
# A cloud seat cannot delete a branch (git push --delete = 403); this Action's
# GITHUB_TOKEN can. No seat needs delete-creds. Runs weekly + on manual dispatch.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: branch-janitor
  cancel-in-progress: false

jobs:
  janitor:
    runs-on: ubuntu-latest
    steps:
      - name: checkout main (full depth)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: delete fully-merged + stale branches (record SHA to ledger first; nothing lost)
        run: |
          git config user.name "nest-branch-janitor"
          git config user.email "noreply@anthropic.com"
          python3 ENGINE/branch_hygiene.py --delete-merged --include-deletion-only --now "$(date +%s)" --stale-days 4 --yes
          if ! git diff --quiet -- STATUS/DELETED_BRANCHES_LEDGER.md; then
            git add STATUS/DELETED_BRANCHES_LEDGER.md
            git commit --no-verify -m "branch-janitor: record deleted-branch tip SHAs to the ledger (nothing-gets-lost, recoverable)"
            for i in 1 2 3 4; do
              git push origin HEAD:main && break
              git fetch origin main && git rebase origin/main || true
              sleep $((2 ** i))
            done
          fi
